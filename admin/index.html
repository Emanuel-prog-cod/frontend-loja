<!DOCTYPE html>
<html>
<head>
  <title>Painel Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h2>Login Admin</h2>
  <input id="usuario" placeholder="Usuário"><br>
  <input id="senha" type="password" placeholder="Senha"><br>
  <button onclick="logar()">Entrar</button>
</div>

<!-- PAINEL -->
<div id="painel" style="display:none;">

  <div class="container">

    <!-- MENU -->
    <div class="menu">
      <h3>Admin</h3>
      <button onclick="mostrar('produtos')">📦 Produtos</button>
      <button onclick="mostrar('pedidos')">🧾 Pedidos</button>
      <button onclick="sair()">🚪 Sair</button>
    </div>

    <!-- CONTEÚDO -->
    <div class="conteudo">

      <!-- PRODUTOS -->
      <div id="aba-produtos">

        <h2>Cadastrar Produto</h2>

        <input id="nome" placeholder="Nome"><br>
        <input id="preco" placeholder="Preço"><br>
        <input id="estoque" placeholder="Estoque"><br>
        <input id="codigo" placeholder="Código de barras"><br>
        <input id="imagem" placeholder="URL da imagem do produto"><br>

        <!-- 👇 INDICADOR DE EDIÇÃO -->
        <p id="modoEdicao" style="color:green; font-weight:bold;"></p>

        <button onclick="cadastrar()">Salvar</button>

        <h2>Produtos</h2>

        <input 
  type="text" 
  id="buscaAdmin" 
  placeholder="🔍 Buscar por nome ou código..." 
  oninput="filtrarAdmin()"
        >

        <ul id="lista"></ul>

      </div>

      <!-- PEDIDOS -->
      <div id="aba-pedidos" style="display:none;">
        <h2>📦 Pedidos</h2>
        <div id="pedidos" style="display: grid; gap: 15px;"></div>
      </div>

    </div>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let todosProdutosAdmin = [];
let codigoEditando = null;

// LOGIN
function logar() {
  const user = usuario.value;
  const pass = senha.value;

  if (user === "manuel" && pass === "1010") {

    // 🔥 SALVA LOGIN
    localStorage.setItem("logado", "true");

    login.style.display = "none";
    painel.style.display = "block";
    listar();
    carregarPedidos();

  } else {
    alert("Usuario ou senha invalidos");
  }
}

// ABAS
function mostrar(aba) {
  document.getElementById("aba-produtos").style.display = "none";
  document.getElementById("aba-pedidos").style.display = "none";

  document.getElementById("aba-" + aba).style.display = "block";
}

// CADASTRAR OU EDITAR
async function cadastrar() {
  const produto = {
  nome: nome.value,
  preco: parseFloat(preco.value),
  estoque: parseInt(estoque.value),
  codigo: codigo.value,
  imagem: imagem.value   // 🖼️ NOVO CAMPO
};

  if (codigoEditando) {
    await fetch("https://backend-loja.vercel.app/produtos/" + codigoEditando, {
      method: "PUT",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(produto)
    });

    codigoEditando = null;
    document.getElementById("modoEdicao").innerText = "";

  } else {
    await fetch("https://backend-loja.vercel.app/produtos", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(produto)
    });
  }

  limparCampos();
  listar();
  carregarPedidos();
}

// LISTAR
async function listar() {
  const res = await fetch("https://backend-loja.vercel.app/produtos");
  const dados = await res.json();

  todosProdutosAdmin = dados;

  lista.innerHTML = "";

  dados.forEach(p => {
    lista.innerHTML += `
  <li>
    <img src="${p.imagem || 'https://via.placeholder.com/100'}" 
         style="width:80px; height:80px; object-fit:cover; border-radius:8px;"><br>

    <strong>${p.nome}</strong><br>
    💰 R$ ${p.preco}<br>
    📦 Estoque: ${p.estoque}<br>
    🔢 Código: ${p.codigo}

    <br><br>
    <button onclick='editar(${JSON.stringify(p)})'>Editar</button>
    <button onclick="deletar('${p._id}')">Excluir</button>
  </li>
`;
  });
}

// EDITAR ✅ (CORRIGIDO)
function editar(produto) {
  nome.value = produto.nome;
  preco.value = produto.preco;
  estoque.value = produto.estoque;
  codigo.value = produto.codigo;

  codigoEditando = produto.codigo;

  document.getElementById("modoEdicao").innerText = "✏️ Editando produto...";
}

// DELETAR
async function deletar(id) {
  await fetch("https://backend-loja.vercel.app/produtos/" + id, {
    method: "DELETE"
  });

  listar();
}

// LIMPAR
function limparCampos() {
  nome.value = "";
  preco.value = "";
  estoque.value = "";
  codigo.value = "";

  codigoEditando = null;
  document.getElementById("modoEdicao").innerText = "";
}

// PEDIDOS
async function carregarPedidos() {
  const res = await fetch("https://backend-loja.vercel.app/pedidos");
  const dados = await res.json();

  const container = document.getElementById("pedidos");
  container.innerHTML = "";

  dados.forEach((pedido, i) => {
    let itensHTML = "";

    pedido.itens.forEach(item => {
      itensHTML += `
        <div class="item-pedido">
      🛒  ${item.nome} x${item.qtd}<br>   🔢 Código: ${item.codigo || "N/A"}<br> 💸 R$ ${item.preco * item.qtd}
        </div>
      `;
    });

    container.innerHTML += `
      <div class="pedido">
        <h4>Pedido #${i + 1}</h4>

<p><strong>👤 Cliente:</strong> ${pedido.cliente || "Não informado"}</p>

${itensHTML}
        <p><strong>💰 Total: R$ ${pedido.total.toFixed(2)}</strong></p>
        <p>📅 ${new Date(pedido.data).toLocaleString()}</p>

        <button onclick='gerarPDF(${JSON.stringify(pedido)})'>
  📄 Baixar PDF
</button>

        <button onclick="deletarPedido('${pedido._id}')">
          🗑️ Excluir Pedido
        </button>
      </div>
    `;
  });
}

// DELETAR PEDIDO
async function deletarPedido(id) {
  const confirmar = confirm("Deseja excluir este pedido?");
  if (!confirmar) return;

  await fetch("https://backend-loja.vercel.app/pedidos/" + id, {
    method: "DELETE"
  });

  carregarPedidos();
}

function gerarPDF(pedido) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 10;

  // TÍTULO
  doc.setFontSize(16);
  doc.text("LOJA MANU PEÇAS", 10, y);

  y += 10;

  // CLIENTE (se tiver no pedido)
  doc.setFontSize(12);
  doc.text("Cliente: " + (pedido.cliente || "Não informado"), 10, y);

  y += 10;

  doc.text("Data: " + new Date(pedido.data).toLocaleString(), 10, y);
y += 10;

  doc.text("----------------------------------------", 10, y);
  y += 10;

  // PRODUTOS
  pedido.itens.forEach(item => {
    doc.text("Produto: " + item.nome, 10, y);
    y += 6;

    doc.text("Código: " + (item.codigo || "N/A"), 10, y);
    y += 6;

    doc.text("Qtd: " + item.qtd, 10, y);
    y += 6;

    doc.text("Preço: R$ " + item.preco, 10, y);
    y += 10;
  });

  doc.text("----------------------------------------", 10, y);
  y += 10;

  // TOTAL
  doc.setFontSize(14);
  doc.text("TOTAL: R$ " + pedido.total.toFixed(2), 10, y);

  // BAIXAR
  doc.save("pedido.pdf");
}

function sair() {
  localStorage.removeItem("logado");

  painel.style.display = "none";
  login.style.display = "block";
}

// 🔥 MANTER LOGADO
if (localStorage.getItem("logado") === "true") {
  login.style.display = "none";
  painel.style.display = "block";
  listar();
  carregarPedidos();
}

function filtrarAdmin() {
  const texto = document.getElementById("buscaAdmin").value.toLowerCase();

  const filtrados = todosProdutosAdmin.filter(p =>
    p.nome.toLowerCase().includes(texto) ||
    String(p.codigo).toLowerCase().includes(texto)
  );

  lista.innerHTML = "";

  filtrados.forEach(p => {
    lista.innerHTML += `
      <li>
        <img src="${p.imagem || 'https://via.placeholder.com/100'}" 
             style="width:80px; height:80px; object-fit:cover; border-radius:8px;"><br>

        <strong>${p.nome}</strong><br>
        💰 R$ ${p.preco}<br>
        📦 Estoque: ${p.estoque}<br>
        🔢 Código: ${p.codigo}

        <br><br>
        <button onclick='editar(${JSON.stringify(p)})'>Editar</button>
        <button onclick="deletar('${p._id}')">Excluir</button>
      </li>
    `;
  });
}

</script>

</body>
</html>
