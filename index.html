<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Loja</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="icon" type="image/png" href="logo.png">
</head>

<body>

  <!-- overlay escuro do carrinho -->
 <button class="btn-carrinho" onclick="toggleCarrinho()">
  🛒 <span id="contadorCarrinho">0</span></button>

  <div class="overlay" onclick="toggleCarrinho()"></div>

<!-- ===== HEADER PROFISSIONAL ===== -->
<header class="topo">
  <h1>🛒 LOJA MANUEL </h1>

  <input 
    type="text" 
    id="busca" 
    placeholder="🔍 Buscar por nome ou código..." 
    oninput="filtrarProdutos()"
  >
</header>

<!-- ===== LAYOUT PRINCIPAL ===== -->
<main class="layout">

  <!-- PRODUTOS -->
  <section class="produtos" id="produtos"></section>

  <!-- CARRINHO -->
 <div class="coluna-direita">

  <aside class="carrinho" id="carrinho">
    <h3>🛒 Carrinho</h3>

    <input id="clienteNome" placeholder="Digite seu nome" style="margin-bottom:10px;">
    
    <ul id="listaCarrinho"></ul>

    <p><strong>Total: R$ <span id="total">0</span></strong></p>

    <button onclick="finalizar()">Finalizar Compra</button>
  </aside>

  <!-- 📦 HISTÓRICO -->
  <section class="pedidos-box">
    <h3>📦 Meus Pedidos</h3>
    <div id="historicoPedidos"></div>
  </section>

</div>

</main>

<script>
let carrinho = [];
let todosProdutos = [];

async function carregarProdutos() {
  const res = await fetch("https://backend-loja.vercel.app/produtos");
  const dados = await res.json();

  todosProdutos = dados;
  renderizarProdutos(dados);
}

function renderizarProdutos(lista) {
  const container = document.getElementById("produtos");
  container.innerHTML = "";

  lista.forEach(p => {
    container.innerHTML += `
  <div class="produto">

    <div class="img-box">
  <img src="${p.imagem || 'https://via.placeholder.com/300'}" alt="${p.nome}">
</div>

    <h3>${p.nome}</h3>
    <p>💰 R$ ${p.preco}</p>
    <p>📦 Estoque: ${p.estoque}</p>
    <p class="codigo">cod. ${p.codigo}</p>

    <button onclick="comprar('${p.codigo}', '${p.nome}', ${p.preco}, this)">
      Comprar
    </button>

  </div>
`;
  });
}

// 🔍 BUSCA
function filtrarProdutos() {
  const texto = document.getElementById("busca").value.toLowerCase();

  const filtrados = todosProdutos.filter(p =>
    p.nome.toLowerCase().includes(texto) ||
    String(p.codigo).toLowerCase().includes(texto)
  );

  renderizarProdutos(filtrados);
}

// 🛒 CARRINHO
function comprar(codigo, nome, preco) {
  const item = carrinho.find(p => p.codigo === codigo);

  const produto = todosProdutos.find(p => p.codigo == codigo);

  if (item) {
    item.qtd++;
  } else {
    carrinho.push({ 
      codigo, 
      nome, 
      preco, 
      qtd: 1,
      imagem: produto.imagem // 👈 NOVO
    });
  }

  atualizarCarrinho();
  atualizarContadorCarrinho();
}

function atualizarCarrinho() {
  const lista = document.getElementById("listaCarrinho");
  const totalSpan = document.getElementById("total");

  lista.innerHTML = "";
  let total = 0;

  carrinho.forEach((item, index) => {
    total += item.preco * item.qtd;

    lista.innerHTML += `
  <li class="item-carrinho">

    <img src="${item.imagem || 'https://via.placeholder.com/60'}">

    <div class="info">
      <strong>${item.nome}</strong>
      <span>Cod: ${item.codigo}</span>

      <div class="qtd">
        <button onclick="diminuir(${index})">-</button>
        <span>${item.qtd}</span>
        <button onclick="aumentar(${index})">+</button>
      </div>

      <span>R$ ${(item.preco * item.qtd).toFixed(2)}</span>
    </div>

    <button onclick="remover(${index})">✖</button>

  </li>
`;
  });

  totalSpan.innerText = total.toFixed(2);
}

function remover(index) {
  carrinho.splice(index, 1);
  atualizarCarrinho();
  atualizarContadorCarrinho();
}

function aumentar(index) {
  carrinho[index].qtd++;
  atualizarCarrinho();
  atualizarContadorCarrinho();
}

function diminuir(index) {
  if (carrinho[index].qtd > 1) {
    carrinho[index].qtd--;
  } else {
    carrinho.splice(index, 1);
  }
  atualizarCarrinho();
  atualizarContadorCarrinho();
}

// ✅ FINALIZAR COMPRA
async function finalizar() {
  if (carrinho.length === 0) {
    alert("Carrinho vazio!");
    return;
  }

  const nome = document.getElementById("clienteNome").value;

  if (!nome) {
    alert("Digite seu nome!");
    return;
  }

  const total = carrinho.reduce((soma, item) => soma + (item.preco * item.qtd), 0);

  const res = await fetch("https://backend-loja.vercel.app/pedido", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
  cliente: nome, // 👈 ESSA LINHA RESOLVE TUDO
  itens: carrinho
})
  });

  const data = await res.json();

 if (res.ok) {
  alert("✅ Pedido realizado com sucesso!");

  // 🔥 CRIA O PEDIDO (ANTES de limpar)
  const pedido = {
    cliente: nome,
    itens: [...carrinho],
    total: total
  };

  // 💾 salvar no histórico local
let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];
pedidos.push(pedido);
localStorage.setItem("pedidos", JSON.stringify(pedidos));
carregarPedidos();

  carrinho = [];
  atualizarCarrinho();
  atualizarContadorCarrinho();
  carregarProdutos();

  // 🔥 FECHA CARRINHO + OVERLAY
  document.getElementById("carrinho").classList.remove("aberto");
  document.querySelector(".overlay").classList.remove("ativo");

} else {
  alert("❌ " + data.erro);
}}

carregarProdutos();
atualizarContadorCarrinho();
carregarPedidos();

function atualizarContadorCarrinho() {
  const contador = document.getElementById("contadorCarrinho");

  let totalItens = carrinho.reduce((soma, item) => soma + item.qtd, 0);

  contador.innerText = totalItens;
}

function toggleCarrinho() {
  const carrinhoEl = document.getElementById("carrinho");
  const overlay = document.querySelector(".overlay");

  carrinhoEl.classList.toggle("aberto");
  overlay.classList.toggle("ativo");
}

function gerarPDF(pedido) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 10;

  doc.setFontSize(16);
  doc.text("LOJA MANUEL PEÇAS", 10, y);

  y += 10;

  doc.setFontSize(12);
  doc.text("Cliente: " + pedido.cliente, 10, y);

  y += 10;

  doc.text("Data: " + new Date().toLocaleString(), 10, y);
  y += 10;

  doc.text("----------------------------------------", 10, y);
  y += 10;

  pedido.itens.forEach(item => {
    doc.text("Produto: " + item.nome, 10, y);
    y += 6;

    doc.text("Código: " + item.codigo, 10, y);
    y += 6;

    doc.text("Qtd: " + item.qtd, 10, y);
    y += 6;

    doc.text("Preço: R$ " + item.preco, 10, y);
    y += 10;
  });

  doc.text("----------------------------------------", 10, y);
  y += 10;

  doc.setFontSize(14);
  doc.text("TOTAL: R$ " + pedido.total.toFixed(2), 10, y);

// 👇 AQUI ENTRA O CÓDIGO
const nomeSeguro = pedido.cliente
  .toLowerCase()
  .replace(/\s+/g, "-")
  .normalize("NFD")
  .replace(/[\u0300-\u036f]/g, "");

doc.save(`pedido-${nomeSeguro}.pdf`);
}

function carregarPedidos() {
  const container = document.getElementById("historicoPedidos");
  const pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

  container.innerHTML = "";

  pedidos.forEach((pedido, index) => {
    let itensHTML = "";

    pedido.itens.forEach(item => {
      itensHTML += `
        <div>
          ${item.nome} x${item.qtd} - R$ ${(item.preco * item.qtd).toFixed(2)}
        </div>
      `;
    });

    container.innerHTML += `
      <div class="pedido-item">
        <strong>👤 ${pedido.cliente}</strong><br>
        ${itensHTML}
        <strong>Total: R$ ${pedido.total.toFixed(2)}</strong><br><br>

        <button onclick='gerarPDF(${JSON.stringify(pedido)})'>
          📄 Gerar PDF
        </button>

        <button onclick="excluirPedido(${index})">
          🗑️ Excluir
        </button>
      </div>
    `;
  });
}

function excluirPedido(index) {
  let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];
  pedidos.splice(index, 1);
  localStorage.setItem("pedidos", JSON.stringify(pedidos));
  carregarPedidos();
}

</script>

</body>
</html>
